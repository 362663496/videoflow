services:
  videoflow:
    build: .
    ports:
      - "8082:8787"
    environment:
      NODE_ENV: production
      PORT: 8787
      VIDEOFLOW_ADMIN_EMAIL: ${VIDEOFLOW_ADMIN_EMAIL:-admin@example.com}
      VIDEOFLOW_ADMIN_PASSWORD: ${VIDEOFLOW_ADMIN_PASSWORD:-change-this-password}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_SCRIPT_MODEL: ${OPENAI_SCRIPT_MODEL:-gpt-4.1}
      VIDEOFLOW_MAX_AI_FRAMES: ${VIDEOFLOW_MAX_AI_FRAMES:-8}
      VIDEOFLOW_WHISPER_MODEL: ${VIDEOFLOW_WHISPER_MODEL:-base}
      VIDEOFLOW_WHISPER_LANGUAGE: ${VIDEOFLOW_WHISPER_LANGUAGE:-zh}
      VIDEOFLOW_ALLOW_REGISTRATION: ${VIDEOFLOW_ALLOW_REGISTRATION:-true}
    volumes:
      - videoflow-data:/app/server/data
      - videoflow-uploads:/app/server/uploads
      - videoflow-outputs:/app/server/outputs
    restart: unless-stopped

volumes:
  videoflow-data:
  videoflow-uploads:
  videoflow-outputs:
